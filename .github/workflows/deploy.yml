name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 94.130.191.178
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ppa-onsite/html
            GIT_SSH_COMMAND="ssh -i /root/.ssh/git_deploy_ppa -o StrictHostKeyChecking=no" git pull origin main
