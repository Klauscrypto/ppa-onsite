name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to All-Inkl via rsync/SSH
        env:
          SSH_KEY: ${{ secrets.ALLINKL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/allinkl_deploy
          chmod 600 ~/.ssh/allinkl_deploy
          ssh-keyscan -H w014eac6.kasserver.com >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/allinkl_deploy" \
            html/ ssh-w014eac6@w014eac6.kasserver.com:/www/htdocs/w014eac6/ppa-onsite.de/
